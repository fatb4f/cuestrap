name: Apply continuous OSCAL ATO proposal

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-continuous-ato-proposal.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Replace proposal and commit
        shell: bash
        run: |
          set -euo pipefail
          target=docs/cuestrap-governed-repository-controller-proposal.md
          workflow=.github/workflows/apply-continuous-ato-proposal.yml
          payload_dir=.github/continuous-ato-payload
          test "$(git hash-object "$target")" = "55ddf2a455911ecd3f7681b50f76e4574d7a6c14"
          cat "$payload_dir"/part-*.txt | base64 -d | gzip -d > "$target"
          test "$(git hash-object "$target")" = "f9ac47657a750fcd349fdc9d7da68462b8947da4"
          python - <<'PYCODE'
          from pathlib import Path
          import re
          text = Path('docs/cuestrap-governed-repository-controller-proposal.md').read_text()
          assert [int(x) for x in re.findall(r'^## (\d+)\. ', text, re.M)] == list(range(1, 35))
          assert text.count('```') % 2 == 0
          assert '## 16. Continuous OSCAL ATO semantic graph and reactive DAG' in text
          assert '## 17. System B runtime telemetry and hook reconciliation' in text
          assert 'one shared typed semantic graph' in text
          PYCODE
          rm -rf "$payload_dir" "$workflow"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$target" "$payload_dir" "$workflow"
          git commit -m "docs: center proposal on continuous OSCAL ATO"
          git push origin HEAD:main
