name: tool bundles

on:
  push:
    tags:
      - "cuestrap-tools-*"
  workflow_dispatch:
    inputs:
      publish:
        description: Create the digest-addressed GitHub Release
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      lock-digest: ${{ steps.bundle.outputs.lock-digest }}
      release-tag: ${{ steps.bundle.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - uses: astral-sh/setup-uv@v6

      - name: Bootstrap the CUE lock reader
        run: go install cuelang.org/go/cmd/cue@806821e40fae070318600a264d311517e596353b

      - name: Build pinned tool archives
        id: bundle
        run: |
          set -o pipefail
          bash tools/bundles/build-linux-amd64.sh dist/release | tee build-output.txt
          sed -n '/^lock-digest=/p; /^release-tag=/p' build-output.txt >> "$GITHUB_OUTPUT"

      - name: Qualify with network access disabled
        run: |
          sudo unshare --net -- \
            bash "$GITHUB_WORKSPACE/tools/bundles/qualify-linux-amd64.sh" \
            "$GITHUB_WORKSPACE/dist/release" \
            "$RUNNER_TEMP/cuestrap-qualification"

      - name: Attest the primary distribution archive
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/release/cuestrap-tools-linux-amd64.tar.zst

      - name: Assemble and verify the coherent offline upload
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" dist/release/attestation.jsonl
          python3 - <<'PY'
          import pathlib
          import zipfile

          root = pathlib.Path("dist/release")
          assets = [
              "install.sh",
              "SHA256SUMS",
              "manifest.json",
              "cuestrap-tools-linux-amd64.tar.zst",
              "attestation.jsonl",
          ]
          destination = root / "cuestrap-tools-linux-amd64-offline.zip"
          with zipfile.ZipFile(destination, "w") as archive:
              for name in assets:
                  info = zipfile.ZipInfo(name, (1980, 1, 1, 0, 0, 0))
                  info.external_attr = (0o755 if name == "install.sh" else 0o644) << 16
                  compression = (
                      zipfile.ZIP_STORED
                      if name.endswith(".tar.zst")
                      else zipfile.ZIP_DEFLATED
                  )
                  archive.writestr(info, (root / name).read_bytes(), compression)
          PY
          mkdir -p "$RUNNER_TEMP/offline-zip"
          python3 - <<'PY'
          import pathlib
          import zipfile

          archive = pathlib.Path("dist/release/cuestrap-tools-linux-amd64-offline.zip")
          destination = pathlib.Path("${{ runner.temp }}/offline-zip")
          expected = {
              "install.sh",
              "SHA256SUMS",
              "manifest.json",
              "cuestrap-tools-linux-amd64.tar.zst",
              "attestation.jsonl",
          }
          with zipfile.ZipFile(archive) as source:
              assert set(source.namelist()) == expected
              source.extractall(destination)
          PY
          (cd "$RUNNER_TEMP/offline-zip" && sha256sum --check --strict SHA256SUMS)

      - name: Upload temporary qualification artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuestrap-tools-${{ steps.bundle.outputs.lock-digest }}
          path: dist/release/
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.build.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate or create the canonical release tag
        run: |
          if [[ "$GITHUB_EVENT_NAME" == push ]]; then
            [[ "$GITHUB_REF_NAME" == "$RELEASE_TAG" ]] || {
              echo "tag $GITHUB_REF_NAME does not match canonical $RELEASE_TAG" >&2
              exit 1
            }
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: cuestrap-tools-${{ needs.build.outputs.lock-digest }}
          path: dist/release

      - name: Publish durable release assets
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            dist/release/cuestrap-tools-linux-amd64.tar.zst \
            dist/release/manifest.json \
            dist/release/SHA256SUMS \
            dist/release/install.sh \
            dist/release/attestation.jsonl \
            dist/release/cuestrap-tools-linux-amd64-offline.zip
