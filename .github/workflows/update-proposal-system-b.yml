name: One-time proposal telemetry update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-proposal-system-b.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source proposal
        run: |
          test "$(git hash-object docs/cuestrap-governed-repository-controller-proposal.md)" = "7f637a96d9039acd64c44b8f1f6381b4c9f775e9"

      - name: Apply normalized System B telemetry specification
        run: |
          python - <<'PY'
          import base64
          import pathlib
          import zlib

          encoded = pathlib.Path('.github/update-proposal-system-b.transform.b64').read_text().strip()
          pathlib.Path('/tmp/modify_proposal.py').write_bytes(zlib.decompress(base64.b64decode(encoded)))
          PY
          python /tmp/modify_proposal.py
          test "$(git hash-object docs/cuestrap-governed-repository-controller-proposal.md)" = "55ddf2a455911ecd3f7681b50f76e4574d7a6c14"
          git diff --check

      - name: Commit final document and remove one-time files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/cuestrap-governed-repository-controller-proposal.md
          git rm .github/workflows/update-proposal-system-b.yml
          git rm .github/update-proposal-system-b.transform.b64
          git commit -m "docs: specify System B telemetry and hook reconciliation"
          git push origin HEAD:main
