name: bootstrap harness

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"
      - uses: astral-sh/setup-uv@v6

      - name: Synchronize the committed uv project
        run: uv sync --locked

      - name: Parse project configuration
        run: |
          uv run --project . --locked --exact -- python - <<'PY'
          import tomllib
          from pathlib import Path

          tomllib.loads(Path("pyproject.toml").read_text())
          tomllib.loads(Path(".codex/config.toml").read_text())
          PY
          bash -n .envrc

      - name: Compile workbook sources
        run: |
          uv run --project . --locked --exact -- \
            python -m compileall -q src/cue-workbook tests

      - name: Run harness unit tests
        shell: bash
        run: |
          set +e
          uv run --project . --locked --exact -- \
            python -m unittest discover -s tests -v \
            2>&1 | tee /tmp/cuestrap-unit-tests.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Exercise browserless workbook transport
        run: |
          set +e
          uv run --project . --locked --exact -- \
            python src/cue-workbook/workbook_cli.py \
              --probe-request tests/fixtures/pilot-request.json \
              >/tmp/cuestrap-probe.json \
              2>/tmp/cuestrap-probe.stderr
          status=$?
          set -e
          cat /tmp/cuestrap-probe.json
          cat /tmp/cuestrap-probe.stderr >&2
          test "$status" -eq 0
          grep -q '"schema": "cuestrap.workbook-result.v0"' /tmp/cuestrap-probe.json

      - name: Upload transport diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cuestrap-transport-diagnostics
          path: |
            /tmp/cuestrap-unit-tests.log
            /tmp/cuestrap-probe.json
            /tmp/cuestrap-probe.stderr
          if-no-files-found: warn

  lt01-execution-qualification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false

      - name: Synchronize the committed uv project
        run: uv sync --locked

      - name: Build pinned CUE evaluator
        run: |
          GOBIN="$RUNNER_TEMP/bin" \
            go install cuelang.org/go/cmd/cue@806821e40fae070318600a264d311517e596353b
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/cue" version

      - name: Build pinned cueprobe runner
        shell: bash
        run: |
          set +e
          uv run --project . --locked --exact -- \
            python src/cue-workbook/bootstrap_cueprobe.py \
            2>&1 | tee /tmp/cuestrap-cueprobe-build.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Run cueprobe Go tests
        working-directory: runner
        run: go test ./...

      - name: Execute deterministic LT-01 matrix
        run: |
          set +e
          uv run --project . --locked --exact -- \
            python src/cue-workbook/workbook_cli.py --lt01 \
              >/tmp/cuestrap-lt01-execution.json \
              2>/tmp/cuestrap-lt01-execution.stderr
          status=$?
          set -e
          cat /tmp/cuestrap-lt01-execution.json
          cat /tmp/cuestrap-lt01-execution.stderr >&2
          test "$status" -eq 0
          uv run --project . --locked --exact -- python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/cuestrap-lt01-execution.json").read_text())
          assert result["schema"] == "cuestrap.lt01-matrix-qualification.v0"
          assert len(result["records"]) == 9
          assert len(result["derivations"]) == 9
          assert len(result["evidence"]["recordDigests"]) == 9
          normal = [
              item for item in result["records"]
              if item["rawRecord"]["action"] == "execute-case"
          ]
          witnesses = [
              item for item in result["records"]
              if item["rawRecord"]["action"] != "execute-case"
          ]
          assert len(normal) == 6
          assert all(
              item["rawRecord"]["observationState"] == "facts-observed"
              for item in normal
          )
          assert {
              item["rawRecord"]["observationState"] for item in witnesses
          } == {
              "transport-failure",
              "capability-absent",
              "invalid-observation",
          }
          assert all(not item["rawRecord"]["facts"] for item in witnesses)
          PY

      - name: Upload LT-01 execution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cuestrap-lt01-execution-evidence
          path: |
            /tmp/cuestrap-cueprobe-build.log
            /tmp/cuestrap-lt01-execution.json
            /tmp/cuestrap-lt01-execution.stderr
          if-no-files-found: error

  native-qualification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: false

      - name: Synchronize the committed uv project
        run: uv sync --locked

      - name: Build pinned native artifacts
        run: |
          uv run --project . --locked --exact -- \
            python src/cue-workbook/bootstrap_native.py

      - name: Run Go native tests
        working-directory: runner
        run: go test ./...

      - name: Run Python native integration tests
        run: |
          uv run --project . --locked --exact -- \
            python -m unittest -v tests.test_native_harness

      - name: Qualify browserless native probe
        run: |
          set +e
          uv run --project . --locked --exact -- \
            python src/cue-workbook/workbook_cli.py \
              --probe-request tests/fixtures/pilot-request.json \
              >/tmp/cuestrap-native-probe.json \
              2>/tmp/cuestrap-native-probe.stderr
          status=$?
          set -e
          cat /tmp/cuestrap-native-probe.json
          cat /tmp/cuestrap-native-probe.stderr >&2
          test "$status" -eq 0
          uv run --project . --locked --exact -- python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/cuestrap-native-probe.json").read_text())
          for backend in ("gopyWorker", "cueprobe"):
              assert result[backend]["facts"].get("available") is True, result[backend]
          comparison = result["nativeComparison"]
          assert comparison["state"] not in {
              "capability-gap",
              "incomparable",
              "engine-identity-mismatch",
          }, comparison
          assert comparison["equivalentEngines"] is True, comparison
          PY

      - name: Upload native qualification diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cuestrap-native-qualification-diagnostics
          path: |
            /tmp/cuestrap-native-probe.json
            /tmp/cuestrap-native-probe.stderr
          if-no-files-found: warn
