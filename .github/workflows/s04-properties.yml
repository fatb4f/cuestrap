name: s04 model properties

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  properties:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false

      - name: Synchronize project
        run: uv sync --locked

      - name: Build pinned CUE oracle
        run: |
          GOBIN="$RUNNER_TEMP/bin" \
            go install cuelang.org/go/cmd/cue@806821e40fae070318600a264d311517e596353b
          echo "CUESTRAP_CUE=$RUNNER_TEMP/bin/cue" >> "$GITHUB_ENV"
          "$RUNNER_TEMP/bin/cue" version

      - name: Compile typed model and properties
        run: |
          uv run --project . --locked --exact -- \
            python -m compileall -q src tests

      - name: Run S04 property and LT-01 fixture suites
        shell: bash
        run: |
          set +e
          uv run --project . --locked --exact -- \
            python -m unittest -v \
              tests.test_s04_properties \
              tests.test_s04_lt01_fixtures \
            2>&1 | tee "$RUNNER_TEMP/s04-properties.log"
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Upload property transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s04-property-transcript
          path: ${{ runner.temp }}/s04-properties.log
          if-no-files-found: error
