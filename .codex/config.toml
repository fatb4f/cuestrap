# Schema reference:
# https://learn.chatgpt.com/docs/config-schema.json

[shell_environment_policy]
inherit = "all"
exclude = ["PYTHONHOME"]

[[hooks.PreToolUse]]
matcher = "^(Bash|apply_patch|Edit|Write|mcp__git_mcp_server__.*|mcp__cue_lsp__.*|mcp__gopls__.*)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = '"$(git rev-parse --show-toplevel)/.venv/bin/python" "$(git rev-parse --show-toplevel)/.codex/hooks/cuestrap_tool_supervisor.py" --repository-root "$(git rev-parse --show-toplevel)" hook'
timeout = 10
statusMessage = "Checking CUEstrap anti-churn evidence"

[[hooks.PostToolUse]]
matcher = "^(Bash|apply_patch|Edit|Write|mcp__git_mcp_server__.*|mcp__cue_lsp__.*|mcp__gopls__.*)$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = '"$(git rev-parse --show-toplevel)/.venv/bin/python" "$(git rev-parse --show-toplevel)/.codex/hooks/cuestrap_tool_supervisor.py" --repository-root "$(git rev-parse --show-toplevel)" hook'
timeout = 10
statusMessage = "Recording CUEstrap progress evidence"

[mcp_servers.cue_lsp]
command = "uv"
args = [
  "run",
  "--project", ".",
  "--locked",
  "--exact",
  "--",
  "python",
  "src/cue-workbook/workbook_cli.py",
  "--serve-mcp",
  "cue-lsp",
]
cwd = "."
enabled = true
required = true
enabled_tools = ["diagnostics", "hover", "definition", "references", "document_symbols"]
startup_timeout_sec = 20
tool_timeout_sec = 30
supports_parallel_tool_calls = false

[mcp_servers.cue_lsp.env]
UV_PROJECT_ENVIRONMENT = ".venv"
PYTHONUNBUFFERED = "1"

[mcp_servers.git-mcp-server]
command = "git-mcp-go"
args = [
  "serve",
  "--mode",
  "go-git",
  "-r=.",
  "--write-access",
]
cwd = "."
enabled = true
required = true
startup_timeout_sec = 20
tool_timeout_sec = 30
supports_parallel_tool_calls = false

[mcp_servers.marimo_code_mode]
url = "http://127.0.0.1:2718/mcp/server"
enabled = true
required = false
tool_timeout_sec = 60
supports_parallel_tool_calls = false

[mcp_servers.gopls]
command = "uv"
args = [
  "run",
  "--project", ".",
  "--locked",
  "--exact",
  "--",
  "python",
  "src/cue-workbook/workbook_cli.py",
  "--serve-mcp",
  "gopls",
]
cwd = "."
enabled = true
required = false
enabled_tools = ["diagnostics", "hover", "definition", "references", "document_symbols"]
startup_timeout_sec = 20
tool_timeout_sec = 30
supports_parallel_tool_calls = false

[mcp_servers.gopls.env]
UV_PROJECT_ENVIRONMENT = ".venv"
PYTHONUNBUFFERED = "1"
